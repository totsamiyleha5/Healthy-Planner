<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="pomo-color">
        <header class="container">
            <h1>Pomodoro Timer</h1>
        </header>
        <section id="timer" class="container text-center d-flex flex-column align-items-center justify-content-center gap-4">
            <div class="d-flex flex-row align-items-center justify-content-center">
                <button id="pomodoro" class="btn-switch active">Pomodoro</button>
                <button id="short-break" class="btn-switch">Short Break</button>
                <button id="long-break" class="btn-switch">Long Break</button>
            </div>
            <div id="pomodoro-count" class="timer-count active">25:00</div>
            <div class="d-flex align-center justify-center">
                <button id="start" class="btn">START</button>
            </div>
            <div class="d-flex align-items-center justify-content-center pt-2">
                <p>Number of pomodoros completed: <span id="pomo-number-total">0</span></p>
            </div>
            <div id="progress-bar"></div>
        </section>
        <footer class="container mt-3">
            <p>Practice project by A.Reed</p>
        </footer>
        <script src="index.js"></script>
    </body>
    


</html>
